<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>懒人设置界面</title>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="loading-mask"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f7f8fa;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      "
    >
      <div
        style="
          width: 40px;
          height: 40px;
          border: 4px solid #1989fa;
          border-top-color: transparent;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "
      ></div>
      <p style="margin-top: 15px; color: #1989fa; font-size: 14px">加载中...</p>
    </div>
    <div id="app"></div>
    <script>
      // 动态加载 data.js，防止被打包工具内联，确保其保持为外部文件方便修改
      window.dataLoaded = new Promise((resolve) => {
        var script = document.createElement("script");
        // 添加时间戳防止缓存
        script.src = "./data.js?t=" + Date.now();
        script.onload = () => {
          console.log("配置数据加载成功");
          resolve();
        };
        script.onerror = () => {
          console.warn("配置数据加载失败，将使用应用内默认值");
          resolve(); // 即使失败也继续，应用内会有兜底（虽然目前逻辑完全依赖它，但保持 Promise resolve 以便应用启动）
        };
        document.head.appendChild(script);
      });
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
